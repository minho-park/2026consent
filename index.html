<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>인증</title>
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body>
    <main class="card" id="auth-card">
      <h1>인증</h1>
      <p class="hint">등록된 이름과 휴대폰 번호를 입력해 주세요.</p>
      <form id="auth-form" autocomplete="off">
        <input
          id="name"
          name="name"
          type="text"
          placeholder="이름"
          required
          autocomplete="off"
        />
        <input
          id="phone"
          name="phone"
          type="tel"
          inputmode="numeric"
          placeholder="010-1234-5678"
          pattern="[0-9\-]*"
          required
          autocomplete="off"
        />
        <button id="submit-btn" type="submit">확인</button>
      </form>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="app.js?v=4"></script>
  </body>
</html>
